name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql://gamepool:gamepool@localhost:5432/gamepool?schema=public
  DIRECT_URL: postgresql://gamepool:gamepool@localhost:5432/gamepool?schema=public

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gamepool
          POSTGRES_PASSWORD: gamepool
          POSTGRES_DB: gamepool
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        continue-on-error: true

      - run: pnpm install

      - run: pnpm db:generate

      - run: pnpm db:migrate

      - run: pnpm typecheck

      - run: pnpm lint
