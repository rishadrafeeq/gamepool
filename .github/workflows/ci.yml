name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql://gamepool:gamepool@localhost:5432/gamepool?schema=public
  DIRECT_URL: postgresql://gamepool:gamepool@localhost:5432/gamepool?schema=public
  NODE_ENV: test
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  ADMIN_JWT_SECRET: ci-test-admin-jwt-secret-min-32-chars
  NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abc"

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gamepool
          POSTGRES_PASSWORD: gamepool
          POSTGRES_DB: gamepool
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        continue-on-error: true

      - run: pnpm install

      - run: pnpm db:generate

      - run: pnpm db:migrate

      - run: pnpm db:seed

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - name: Production build
        run: pnpm build --filter=@gamepool/web
        env:
          FIREBASE_PROJECT_ID: ci-placeholder
          FIREBASE_CLIENT_EMAIL: ci@placeholder.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nCI\n-----END PRIVATE KEY-----\n"

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gamepool
          POSTGRES_PASSWORD: gamepool
          POSTGRES_DB: gamepool
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        continue-on-error: true

      - run: pnpm install

      - run: pnpm db:generate
      - run: pnpm db:migrate
      - run: pnpm db:seed

      - name: Build web app
        run: pnpm build --filter=@gamepool/web
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_HOST_EMAIL: ${{ secrets.E2E_HOST_EMAIL }}
          E2E_HOST_PASSWORD: ${{ secrets.E2E_HOST_PASSWORD }}
          E2E_JOINER_EMAIL: ${{ secrets.E2E_JOINER_EMAIL }}
          E2E_JOINER_PASSWORD: ${{ secrets.E2E_JOINER_PASSWORD }}
          E2E_TEST_PHONE: ${{ secrets.E2E_TEST_PHONE }}
          E2E_TEST_OTP: ${{ secrets.E2E_TEST_OTP }}
          E2E_ADMIN_EMAIL: admin@gamepool.local
          E2E_ADMIN_PASSWORD: changeme
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          ADMIN_JWT_SECRET: ci-e2e-admin-jwt-secret-min-32-chars-long
          DATABASE_URL: postgresql://gamepool:gamepool@localhost:5432/gamepool?schema=public
          DIRECT_URL: postgresql://gamepool:gamepool@localhost:5432/gamepool?schema=public
          NEXT_PUBLIC_APP_URL: http://localhost:3000
