services:
  postgres:
    image: postgres:16-alpine
    container_name: gamepool-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gamepool
      POSTGRES_PASSWORD: gamepool
      POSTGRES_DB: gamepool
    volumes:
      - gamepool_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamepool -d gamepool"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gamepool_pg_data:
